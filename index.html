<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" type="image/jfif" size="180x180" href="/dp.jfif">
    <link rel="icon" type="image/jfif" size="32x32" href="/dp.jfif">
    <link rel="icon" type="image/jfif" size="16x16" href="/dp.jfif">
    <link rel="manifest" href="/site.webmanifest">
    <meta property="og:url"           content="https://akmaryanaman.github.io/CricketScore/index.html" />
    <meta property="og:type"          content="website" />
    <meta property="og:title"         content="GullyCric" />
    <meta property="og:description"   content="GullyCric is Scoreboard for Gully Cricket" />
    <meta property="og:image"         content="/dp.jfif" />

    <title>GullyCric</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setup-overlay">
        <div class="container col-md-6">
            <div class="card shadow-lg p-4 text-center border-0">
                <h2 class="mb-4 text-primary fw-bold">Series Setup</h2>
                <div class="row g-3 text-start">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Team 1</label>
                        <input type="text" id="t1-name-input" class="form-control" placeholder="Lions">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Team 2</label>
                        <input type="text" id="t2-name-input" class="form-control" placeholder="Tigers">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Overs Limit</label>
                        <input type="number" id="overs-limit-input" class="form-control" value="5">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Players (Each)</label>
                        <input type="number" id="players-limit-input" class="form-control" value="11">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Batting First</label>
                        <select id="first-bat-input" class="form-select">
                            <option value="1">Team 1</option>
                            <option value="2">Team 2</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary w-100 btn-lg mt-4 fw-bold" onclick="startSeries()">START GAME</button>
            </div>
        </div>
    </div>

    <!-- Next Match Selection -->
    <div id="next-match-overlay" style="display: none;">
        <div class="container col-md-6 text-center">
            <div class="card shadow-lg p-4 border-0">
                <h3 class="mb-4 text-primary">Match Finished! Select Batting First</h3>
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-primary btn-lg py-3 fw-bold" id="next-bat-t1-btn" onclick="prepareNextMatch(1)"></button>
                    <button class="btn btn-outline-primary btn-lg py-3 fw-bold" id="next-bat-t2-btn" onclick="prepareNextMatch(2)"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- scoreboard Section -->
    <div class="score-section text-center sticky-top">
        <div class="container px-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <button class="btn btn-outline-danger btn-sm" onclick="resetSeries()">Reset Series</button>
                <div class="series-tally fw-bold badge bg-dark py-2 px-3" id="series-display">0 - 0</div>
                <button class="btn btn-outline-light btn-sm" data-bs-toggle="offcanvas" data-bs-target="#offcanvasHistory">Match Log</button>
            </div>
            <div class="mb-1 text-uppercase small fw-bold" id="current-batting-name">...</div>
            <h1 class="main-score mb-0" id="score-text">0 - 0</h1>
            
            <div class="d-flex justify-content-center gap-2 mt-2">
                <!-- TARGET BOX: Forced visibility via script -->
                <div id="target-display" class="text-warning fw-bold border border-warning px-3 py-1 rounded" style="display:none; background: rgba(0,0,0,0.2);"></div>
                <div id="info-bar" class="text-light small border border-light px-2 py-1 rounded"></div>
            </div>
            
            <p class="overs text-light mb-0 fs-3 mt-1 fw-bold" id="over-text">0.0</p>
        </div>
    </div>

    <div class="container mt-3" style="margin-bottom: 280px;">
        <div id="series-log" class="small"></div>
    </div>

    <!-- Control Pad -->
    <div class="control-pad">
        <div class="container text-center">
            <div id="nb-status" class="text-danger small fw-bold mb-1" style="display:none;">NO BALL ACTIVE</div>
            <div class="row g-2">
                <div class="col-4"><button class="btn btn-outline-primary btn-score w-100" onclick="processInput(0)">0</button></div>
                <div class="col-4"><button class="btn btn-outline-primary btn-score w-100" onclick="processInput(1)">1</button></div>
                <div class="col-4"><button class="btn btn-outline-primary btn-score w-100" onclick="processInput(2)">2</button></div>
                <div class="col-4"><button class="btn btn-outline-primary btn-score w-100" onclick="processInput(3)">3</button></div>
                <div class="col-4"><button class="btn btn-outline-primary btn-score w-100" onclick="processInput(4)">4</button></div>
                <div class="col-4"><button class="btn btn-outline-primary btn-score w-100" onclick="processInput(6)">6</button></div>
                <div class="col-4"><button class="btn btn-warning text-white btn-score w-100" onclick="processInput('WD')">WD</button></div>
                <div class="col-4"><button id="nb-btn" class="btn btn-warning text-white btn-score w-100" onclick="toggleNoBall()">NB</button></div>
                <div class="col-4"><button class="btn btn-danger btn-score w-100" onclick="processInput('W')">W</button></div>
                <div class="col-12 mt-1"><button class="btn btn-secondary w-100 py-1 fw-bold" onclick="undoLast()">UNDO LAST BALL</button></div>
            </div>
        </div>
    </div>

    <!-- Inning Transition Modal -->
    <div class="modal fade" id="inningModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-header border-0 bg-warning text-dark justify-content-center">
                    <h5 class="modal-title fw-bold">INNING OVER</h5>
                </div>
                <div class="modal-body py-4">
                    <p id="inningModalText" class="fs-5"></p>
                    <p class="text-muted">Do you want to move to the 2nd Inning?</p>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cancel (Stay)</button>
                    <button type="button" class="btn btn-primary px-4 fw-bold" onclick="confirmInningSwitch()">Start 2nd Inning</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div class="modal fade" id="resultModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center border-0 shadow-lg">
                <div class="modal-body py-5" id="modalBody"></div>
                <div class="modal-footer border-0 justify-content-center">
                    <button type="button" class="btn btn-primary btn-lg fw-bold px-5" id="modalConfirmBtn">NEXT MATCH</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Universal Confirmation Modal -->
    <div class="modal fade" id="confirmModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center border-0 shadow">
                <div class="modal-header border-0 bg-danger text-white justify-content-center" id="confirmHeader">
                    <h5 class="modal-title fw-bold" id="confirmTitle">CONFIRMATION</h5>
                </div>
                <div class="modal-body py-4">
                    <p id="confirmBodyText" class="fs-5"></p>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger px-4 fw-bold" id="globalConfirmBtn">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasHistory">
        <div class="offcanvas-header bg-dark text-white"><h5>Match Log</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button></div>
        <div class="offcanvas-body p-0 bg-light" id="history-list"></div>
    </div>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js?v=1.2"></script>
</body>
</html>
